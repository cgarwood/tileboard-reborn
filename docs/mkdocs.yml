site_name: TileBoard Reborn
site_description: A modern, configurable dashboard for Home Assistant
site_url: https://tileboard-reborn.readthedocs.io
repo_url: https://github.com/cgarwood/tileboard-reborn
repo_name: cgarwood/tileboard-reborn
docs_dir: .

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - javascript
    - yaml
    - python

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration:
      - Overview: configuration/index.md
      - Pages: configuration/pages.md
      - Widgets:
          - Overview: configuration/widgets/index.md
          - Sensor: configuration/widgets/sensor.md
          - Sensor Icon: configuration/widgets/sensor-icon.md
          - Button: configuration/widgets/button.md
          - Switch: configuration/widgets/switch.md
          - Light: configuration/widgets/light.md
          - Climate: configuration/widgets/climate.md
          - Camera: configuration/widgets/camera.md
          - Weather: configuration/widgets/weather.md
          - Calendar: configuration/widgets/calendar.md
          - Fan: configuration/widgets/fan.md
          - Number: configuration/widgets/number.md
          - List: configuration/widgets/list.md
      - Screensaver: configuration/screensaver.md
      - Restrictions: configuration/restrictions.md
  - Development: development.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cgarwood/tileboard-reborn
